  <style>
    /* Custom styles for admin panel */
    .image-preview {
      transition: all 0.3s ease;
    }
    .image-preview:hover {
      transform: scale(1.05);
    }
    .cover-image {
      border: 3px solid #1311a3f3;
    }
    .sortable-placeholder {
      border: 2px dashed #ccc;
      background-color: #f9f9f9;
      min-height: 100px;
    }
    .loading-spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-left-color: #1311a3f3;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Drag and drop styles */
    .image-preview.drag-over {
      border: 2px dashed #1311a3f3;
      background-color: rgba(19, 17, 163, 0.1);
    }
    .image-preview.opacity-50 {
      opacity: 0.5;
    }
  </style>

        <!-- Update Form -->

          <form id="updateForm">
            <p class="text-[#1311a3f3] text-xl pb-4 font-semibold">Design Edit Form</p>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
              <div>

                <input type="text" id="projectTitle" required class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:border-[#1311a3f3] focus:outline-none transition-colors">
              </div>
              
              <div>
                <label for="category" class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                <select id="category" required class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:border-[#1311a3f3] focus:outline-none transition-colors">

                  <option value="Branding">Branding</option>
                  <option value="Social-media">Social Media</option>
                  <option value="UI-UX">UI/UX Design</option>
                  <option value="Print">Print Design</option>
                </select>
              </div>
            </div>
            <label for="projectThumbs" class="block text-sm font-medium text-slate-700 mb-6">Description</label>
               <div class="min-h-0">
      <div id="projectThumbs" class="flex flex-wrap max-sm:overflow-x-auto max-sm:flex-nowrap gap-2"></div>
    </div>
            
            <div class="mb-6">
              <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
              <textarea id="description" rows="4" required class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:border-[#1311a3f3] focus:outline-none transition-colors"></textarea>
            </div>
         
            <div class="flex items-center space-x-4">

              <input type="file" id="imageUpdate" accept="image/*" multiple class="w-0.5 h-0.5" >
               <span id="photosInfo" class="text-sm text-nowrap whitespace-nowrap text-gray-500">No file chosen </span>
            </div>
            <p class="text-sm text-slate-500  my-3">Selected images will be added to your existing catalog.</p>
